<!DOCTYPE html>
<html>

<head>

    <title>Dear Me</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="welcomeScreen">

    <h1>💌 Dear Me</h1>

    <p class="tagline">
        Write today.<br>
        Open tomorrow.
    </p>

    <div id="envelope" onclick="openEnvelope()">

        <div class="top"></div>

        <div class="bottom"></div>

    </div>

    <p class="tap">
        Tap the envelope
    </p>

</div>


<div id="app" class="hidden">

<header>

<h1>💌 Dear Me</h1>


</header>


<div class="card">

<label>Title</label>

<input id="title">

<label>Your Letter</label>

<textarea id="message"></textarea>

<label>Unlock Date</label>

<input type="date" id="unlockDate">

<button onclick="saveLetter()">

Lock My Letter 🔒

</button>

</div>

<h2>My Letters</h2>

<div id="letters"></div>

</div>

<script src="script.js"></script>

</body>

</html>
