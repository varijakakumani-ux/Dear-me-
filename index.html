<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Me</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Welcome Screen -->
<div id="welcomeScreen">

    <h1>Dear Me</h1>

    <p class="tagline">
        Write today.<br>
        Open tomorrow.
    </p>

    <div id="envelope" onclick="openEnvelope()">

        <div class="top"></div>

        <div class="letter">
            💌
        </div>

        <div class="bottom"></div>

    </div>

    <p class="tap">
        Tap the envelope
    </p>

</div>

<!-- Main App -->
<div id="app" class="hidden">

    <header>
        <h1>Dear Me</h1>
    </header>

    <div class="card">

        <label for="title">Title</label>
        <input
            id="title"
            type="text"
            placeholder="Enter your letter title">

        <label for="message">Your Letter</label>
        <textarea
            id="message"
            placeholder="Write something for your future self..."></textarea>

        <label for="unlockDate">Unlock Date</label>
        <input
            id="unlockDate"
            type="date">

        <button onclick="saveLetter()">
            🔒 Lock My Letter
        </button>

    </div>

    <h2>My Letters</h2>

    <div id="letters"></div>

</div>

<script src="script.js"></script>

</body>
</html>
